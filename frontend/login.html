<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | FitQuest</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="site-header">
    <nav class="nav">
      <a class="brand" href="index.html"><span class="brand-mark">FQ</span>FitQuest</a>
      <div class="nav-links">
        <a class="is-active" href="login.html">Login</a>
        <a href="signup.html">Signup</a>
      </div>
    </nav>
  </header>

  <main class="auth-page">
    <section class="auth-card">
      <h1>Welcome back</h1>
      <p class="muted">Pick up your streak, points, and daily challenge.</p>
      <form id="loginForm" class="form-grid">
        <label>Email
          <input type="email" name="email" autocomplete="email" required>
        </label>
        <label>Password
          <input type="password" name="password" autocomplete="current-password" required>
        </label>
        <button class="btn primary" type="submit">Login</button>
      </form>
      <p id="loginMessage" class="form-message"></p>
      <p class="muted">New here? <a href="signup.html">Create an account</a></p>
    </section>
  </main>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
