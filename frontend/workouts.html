<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workouts | FitQuest</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="site-header">
    <nav class="nav">
      <a class="brand" href="dashboard.html"><span class="brand-mark">FQ</span>FitQuest</a>
      <div class="nav-links">
        <a href="dashboard.html">Dashboard</a>
        <a class="is-active" href="workouts.html">Workouts</a>
        <a href="leaderboard.html">Leaderboard</a>
        <a href="profile.html">Profile</a>
        <button class="ghost-link" data-logout>Logout</button>
      </div>
    </nav>
  </header>

  <main class="page-shell">
    <section class="section-heading">
      <div>
        <p class="eyebrow">Programs</p>
        <h1>Workout programs</h1>
        <p class="muted">Beginner, intermediate, advanced, yoga, cardio, and strength training.</p>
      </div>
      <a class="btn secondary" data-admin-link hidden href="admin.html">Admin</a>
    </section>

    <div id="workoutFilters" class="filter-row"></div>
    <p id="workoutsMessage" class="form-message"></p>
    <section id="workoutGrid" class="program-grid"></section>

    <section id="workoutTimerPanel" class="panel timer-panel" hidden>
      <div class="section-heading">
        <div>
          <p class="eyebrow">Workout timer</p>
          <h2 id="timerWorkoutTitle">Workout in progress</h2>
          <p id="timerWorkoutMeta" class="muted"></p>
        </div>
        <div class="section-actions">
          <button id="pauseTimerButton" class="btn secondary" type="button">Pause</button>
          <button id="resetTimerButton" class="btn secondary" type="button">Reset</button>
          <button id="completeTimerButton" class="btn primary" type="button">Complete Workout</button>
        </div>
      </div>
      <div class="timer-display">
        <strong id="timerElapsed">00:00</strong>
        <span id="timerTarget" class="muted">Target 0 min</span>
      </div>
      <div class="progress">
        <span id="timerProgressBar" style="width: 0%"></span>
      </div>
      <div id="timerExerciseList" class="badge-row"></div>
      <div id="timerDemoLinks" class="demo-links"></div>
    </section>
  </main>

  <script src="js/config.js?v=20260424"></script>
  <script src="js/api.js?v=20260424"></script>
  <script src="js/workouts.js"></script>
</body>
</html>
